name: Build, Test & Auto-Publish

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'package.json'
      - '__tests__/**'
      - '.github/workflows/auto-publish.yml'

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: '20'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check for unpublished changes
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "First release detected"
          else
            CHANGES=$(git diff --name-only "$LAST_TAG" HEAD -- src/ | wc -l)
            if [ "$CHANGES" -gt 0 ]; then
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
              echo "Source code changes detected: $CHANGES files"
            else
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
              echo "No source changes since last tag, skipping publish"
            fi
          fi

      - name: Bump patch version
        if: steps.check.outputs.should_publish == 'true'
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          # Sync version to server.json and registry manifest
          node -e "
            const fs = require('fs');
            const v = '$NEW_VERSION';
            const sj = JSON.parse(fs.readFileSync('server.json','utf8'));
            sj.version = v;
            if (sj.packages) sj.packages.forEach(p => p.version = v);
            fs.writeFileSync('server.json', JSON.stringify(sj, null, 2) + '\n');
            const mf = JSON.parse(fs.readFileSync('registry/bitbucket-mcp.manifest.json','utf8'));
            mf.version = v;
            fs.writeFileSync('registry/bitbucket-mcp.manifest.json', JSON.stringify(mf, null, 2) + '\n');
          "
          git add package.json server.json registry/bitbucket-mcp.manifest.json
          git commit -m "chore: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"

      - name: Publish to npm (Trusted Publishing / OIDC)
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm publish --provenance --access public --no-git-checks

      - name: Push version commit and tag
        if: steps.check.outputs.should_publish == 'true'
        run: |
          git push origin HEAD
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes "Version ${{ steps.version.outputs.version }}

          Published to:
          - NPM: https://npmjs.com/package/@atercates/bitbucket-mcp

          Install: \`pnpm add @atercates/bitbucket-mcp\`"
