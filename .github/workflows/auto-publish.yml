name: Build, Test & Auto-Publish

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'package.json'
      - '__tests__/**'
      - '.github/workflows/auto-publish.yml'

permissions:
  contents: write # Create tags and releases
  id-token: write # OIDC authentication to NPM

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for unpublished changes
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "First release detected"
          else
            CHANGES=$(git diff --name-only "$LAST_TAG" HEAD | grep -E '^src/' | wc -l)
            if [ "$CHANGES" -gt 0 ]; then
              echo "should_publish=true" >> $GITHUB_OUTPUT
              echo "Source code changes detected: $CHANGES files"
            else
              echo "should_publish=false" >> $GITHUB_OUTPUT
              echo "No source changes since last tag, skipping publish"
            fi
          fi

      - name: Bump version and tag
        if: steps.check.outputs.should_publish == 'true'
        id: version
        run: |
          pnpm publish:patch
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm publish --no-git-checks

      - name: Validate server.json
        if: steps.check.outputs.should_publish == 'true'
        run: node scripts/validate-server-json.mjs

      - name: Create GitHub Release
        if: steps.check.outputs.should_publish == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: |
            Version ${{ steps.version.outputs.version }}
            
            Published to:
            - NPM: https://npmjs.com/package/@atercates/bitbucket-mcp
          draft: false
          prerelease: false
